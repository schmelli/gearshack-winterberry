name: Claude Code Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.review.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.issue.title, '@claude') ||
      github.event.assignee.login == 'claude-bot'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create MCP config file
        run: |
          cat > /tmp/mcp-config.json << 'MCPEOF'
          {
            "mcpServers": {
              "sequential-thinking": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-sequential-thinking"]
              },
              "byterover-mcp": {
                "httpUrl": "https://mcp.byterover.dev/v2/mcp",
                "headers": {
                  "Authorization": "Bearer ${{ secrets.BYTEROVER_TOKEN }}"
                }
              },
              "context7": {
                "type": "http",
                "url": "https://mcp.context7.com/mcp",
                "headers": {
                  "CONTEXT7_API_KEY": "${{ secrets.CONTEXT7_KEY }}"
                }
              }
            }
          }
          MCPEOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: |
            --model claude-sonnet-4-6
            --system-prompt "Read CLAUDE.md for core project rules and information regarding the tech stack. CI/CD Context: Assess the specific issues, requests or recommendations described in the comment/issue/review. Think hard to identify the root problem(s). Generate a thorough and detailed plan for implementation of a suitable fix. Only then implement that fix following your plan. If necessary update or generate tests and documentation. Always run relevant tests before committing. If tests fail, fix the code and retry (max 3 times). Output concise summaries of your changes."
            --mcp-config /tmp/mcp-config.json

          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash",
                  "mcp__sequential-thinking__*",
                  "mcp__byterover-mcp__*",
                  "mcp__context7__*"
                ]
              }
            }
